<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopcornPicks</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-
    SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
    crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
  <body class = "d-flex align-items-center justify-content-center" style = "min-height: 100vh;">
    <div class="card p-4" style="width: 300px;" max-width:400px; background-color: #3a3a3a border: 1px solid #555;">
        <h4 class="card-title text-center mb-4">Sign Up</h4>


<div id="error-msg" class="alert alert-danger d-none"></div>

        <div class="mb-3">
            <label class="form-label text-secondary">Full name</label>
            <input type="text" id="full-name" class="form-control" placeholder="Full name">
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary">Email</label>
            <input type="email" id="register-email" class="form-control" placeholder="you@email.com">
        </div>

        <div class="mb-3">
            <label class="form-label text-secondary">Password</label>
            <input type="password" id="register-password" class="form-control" placeholder="Your password">
        </div>

        <button onclick="handleRegister()" class="btn w-100" style="background-color: #612D53; color: white;">
            Sign Up
        </button>

        <p class="text-center text-secondary mt-3" style="font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: #b07aaa;">Login here</a>
        </p>
    </div>

    <script src="auth.js"></script>
</body>
</html>
