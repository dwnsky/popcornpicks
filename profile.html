<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopcornPicks</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-
    SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
    crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <header>
        <a href="index.html" class="brand-logo">
            <i class="bi bi-film"></i> PopcornPicks
        </a>
        <div class="user-actions">
            <button onclick="handleLogout()" class="btn btn-outline-secondary rounded-pill">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </header>

    <div class="profile-card">
        <img id="profile-preview" src="default-avatar.png" alt="Profile Photo">
        <input type="file" id="profile-upload" accept="image/*" hidden>

        <div class="d-flex align-items-center justify-content-center gap-2 mt-3">
            <h4 id="username-display" class="text-white mb-0">John Doe</h4>
            <i class="bi bi-pencil text-accent" id="edit-icon" style="cursor:pointer;" onclick="toggleEdit()"></i>
        </div>

        <div id="edit-fields" class="edit-container">
            <input type="text" id="edit-username" class="form-control auth-input mb-2" placeholder="New username">
            <label for="profile-upload" class="btn btn-outline-secondary btn-sm rounded-pill mb-2">
                <i class="bi bi-camera"></i> Change Photo
            </label>
            <br>
            <button onclick="saveEdits()" class="btn btn-sm rounded-pill btn-save">Save</button>
            <button onclick="cancelEdit()" class="btn btn-sm btn-outline-secondary rounded-pill">Cancel</button>
        </div>

        <p id="email-display" class="text-accent text-center mt-2">user@example.com</p>

        <hr class="hr-muted">

        <h6 class="text-white text-start">Change Password</h6>
        <div id="password-msg" class="alert d-none mt-2"></div>

        <div class="mb-2 text-start">
            <label class="form-label auth-label">Current Password</label>
            <input type="password" id="currentPassword" class="form-control auth-input" placeholder="Enter current password">
        </div>

        <div class="mb-2 text-start">
            <label class="form-label auth-label">New Password</label>
            <input type="password" id="newPassword" class="form-control auth-input" placeholder="Enter new password">
        </div>

        <div class="mb-3 text-start">
            <label class="form-label auth-label">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" class="form-control auth-input" placeholder="Repeat new password">
        </div>

        <button onclick="changePassword()" class="btn w-100 mb-2 btn-update-password">Update Password</button>
        <button onclick="deleteAccount()" class="btn w-100 btn-delete"><i class="bi bi-trash3"></i>Delete Account</button>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
