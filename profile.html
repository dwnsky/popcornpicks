<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopcornPicks</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-
    SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
    crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <header>
        <a href="index.html" class="brand-logo">
            <i class="bi bi-film"></i> PopcornPicks
        </a>
        <div class="user-actions">
            <button onclick="handleLogout()" class="btn btn-outline-secondary rounded-pill">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </header>

    <div class="profile-card">
        <img id="profile-preview" src="" alt="Profile Photo">

        <input type="file" id="profile-upload" accept="image/*">
        <label for="profile-upload" class="upload-label">
            <i class="bi bi-camera"></i> Change Photo
        </label>

        <h4 id="username-display" class="text-white mt-2"></h4>
        <p id="email-display" style="color:#b07aaa; text-align:center;"></p>

        <button onclick="deleteAccount()" class="btn-delete-account">Delete Account</button>

        <hr style="border-color:#555;">
        <h6 class="text-white text-start">Change Password</h6>

        <div id="password-msg" class="alert d-none mt-2"></div>

        <div class="mb-2 text-start">
            <label class="form-label" style="color:#C4C4C4;">Current Password</label>
            <input type="password" id="currentPassword" class="form-control auth-input" placeholder="Enter current password">
        </div>

        <div class="mb-2 text-start">
            <label class="form-label" style="color:#C4C4C4;">New Password</label>
            <input type="password" id="newPassword" class="form-control auth-input" placeholder="Enter new password">
        </div>

        <div class="mb-3 text-start">
            <label class="form-label" style="color:#C4C4C4;">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" class="form-control auth-input" placeholder="Repeat new password">
        </div>

        <button onclick="changePassword()" class="btn-change-password">Update Password</button>

        <a href="index.html">
            <button class="btn-done-editing">Done</button>
        </a>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
