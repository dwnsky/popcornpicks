<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopcornPicks</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-
    SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
    crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
        <header>
            <a href="index.html" class="brand-logo">
                <i class="bi bi-film" align="middle"></i> PopcornPicks 
            </a>
            
            <div class="user-actions">
                <button onclick="handleLogout()" class="btn btn-outline-secondary rounded-pill">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </header>
        
    <p>Welcome to your profile page!</p>

   <div class="container-profile">
        <h2>My Profile</h2>
        <div id="profile-container">
            <img id="profile-preview" src="default-avatar.png" alt="Profile Preview">
        </div>
        <input type="file" id="profile-upload" accept="image/*" onchange="previewImage(event)">
        <p><strong>Name:</strong> John Doe</p>
        <p><strong>Email:</strong> john.doe@gmail.com</p>



        <div class="card p-4" style="width:100%; max-width:400px; background-color:#3a3a3a; border:1px solid #555;">
    
    <h4 class="text-white text-center mb-1" id="username-display"></h4>
    <p class="text-center mb-4" style="color:#b07aaa;" id="email-display"></p>



</div>
   </div>
    
    <script src="auth.js"></script>
    <script src="script.js"></script>
<script>
    const user = checkSession(); 
    document.getElementById('username-display').textContent = user.name;
    document.getElementById('email-display').textContent = user.email;
</script>

</body>
</html>
