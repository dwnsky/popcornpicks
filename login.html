<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopcornPicks</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
    rel="stylesheet" integrity="sha384-
    SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
    crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="app.css">
</head>


<body class = "d-flex align-items-center justify-content-center" style = "min-height: 100vh;">
<header>
    <a href="index.html" class="brand-logo">
        <i class="bi bi-film"></i> PopcornPicks
    </a>
</header>

    <div class="card p-4  auth-card" style="width: 300px;" max-width:400px; background-color: #3a3a3a border: 1px solid #555;">
        <h4 class="card-title text-center mb-4 text-white">Login</h4>


<div id="error-msg" class="alert alert-danger d-none"></div>

        <div class="mb-3">
             <label class="form-label" style="color: #C4C4C4;"">Email</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="you@email.com">
        </div>

        <div class="mb-3">
             <label class="form-label" style="color: #C4C4C4;">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Your password">
        </div>

        <button onclick="handleLogin()" class="btn btn-auth w-100" style="background-color: #612D53; color: white;">
            Login
        </button>

        <p class="text-center text-secondary mt-3" style="font-size: 0.9rem;">
            No account? <a href="register.html" style="color: #b07aaa;">Register here</a>
        </p>
    </div>

    <script src="auth.js"></script>

</body>
</html>
